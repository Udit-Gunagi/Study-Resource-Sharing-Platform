<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StudyShare – Upload</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <nav id="navbar"></nav>
  <div class="container page" style="max-width:680px">
    <div style="margin-bottom:2rem">
      <h1 class="section-title" style="font-size:2rem">Upload Resource</h1>
      <div class="accent-line"></div>
      <p class="section-sub">Share your notes, PDFs, presentations, or useful links.</p>
    </div>
    <div class="card" id="upload-card">
      <div class="tabs" id="type-tabs" style="margin-bottom:1.5rem">
        <button class="tab active" onclick="switchType('file')">📄 File</button>
        <button class="tab" onclick="switchType('link')">🔗 Link</button>
      </div>
      <div class="form-group"><label class="form-label">Title *</label><input id="u-title" class="form-control" type="text" placeholder="e.g. Thermodynamics Chapter 5 Notes"/></div>
      <div class="form-group"><label class="form-label">Subject *</label>
        <select id="u-subject" class="form-control">
          <option value="">Select subject…</option>
          <option>Mathematics</option><option>Physics</option><option>Chemistry</option>
          <option>Biology</option><option>Computer Science</option><option>History</option>
          <option>Geography</option><option>Economics</option><option>English</option><option>Other</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">Description</label><textarea id="u-desc" class="form-control" placeholder="What does this resource cover?"></textarea></div>
      <div class="form-group"><label class="form-label">Tags <small style="color:var(--text-dim)">(comma-separated)</small></label><input id="u-tags" class="form-control" type="text" placeholder="e.g. thermodynamics, heat, energy"/></div>
      <div id="file-section" class="form-group">
        <label class="form-label">File *</label>
        <div class="drop-zone" id="drop-zone" onclick="document.getElementById('u-file').click()">
          <div id="drop-label"><div style="font-size:2rem;margin-bottom:0.5rem">📂</div><div style="font-weight:600;margin-bottom:0.25rem">Click or drag & drop</div><div style="font-size:0.82rem;color:var(--text-dim)">PDF, DOC, DOCX, PPT, PPTX, TXT, PNG, JPG, ZIP – max 20MB</div></div>
        </div>
        <input id="u-file" type="file" class="hidden" accept=".pdf,.doc,.docx,.ppt,.pptx,.txt,.png,.jpg,.jpeg,.zip" onchange="handleFileSelect(this)"/>
      </div>
      <div id="link-section" class="form-group hidden"><label class="form-label">URL *</label><input id="u-link" class="form-control" type="url" placeholder="https://drive.google.com/…"/></div>
      <div id="progress-wrap" class="hidden" style="margin-bottom:1rem">
        <div style="display:flex;justify-content:space-between;font-size:0.82rem;color:var(--text-muted);margin-bottom:0.4rem"><span>Uploading…</span><span id="progress-pct">0%</span></div>
        <div class="progress"><div class="progress-fill" id="progress-bar" style="width:0%"></div></div>
      </div>
      <button id="upload-btn" class="btn btn-primary btn-lg" style="width:100%" onclick="doUpload()">🚀 Upload Resource</button>
    </div>
    <div style="margin-top:3rem">
      <h2 class="section-title" style="font-size:1.2rem">Your Recent Uploads</h2>
      <div class="accent-line" style="width:40px"></div>
      <div id="my-uploads"></div>
    </div>
  </div>
  <div id="toasts" class="toast-container"></div>
  <script src="js/app.js"></script>
  <script>
    let uploadType = 'file';
    document.addEventListener('DOMContentLoaded', () => {
      renderNav('upload');
      if (!Auth.isLoggedIn()) { document.getElementById('upload-card').innerHTML = `<div class="empty"><div class="empty-icon">🔒</div><h3>Login required</h3><p>Please <a href="#" onclick="openAuthModal('login')" style="color:var(--accent)">login</a> to upload.</p></div>`; return; }
      setupDragDrop(); loadMyUploads();
    });

    function switchType(type) {
      uploadType = type;
      document.querySelectorAll('#type-tabs .tab').forEach((t, i) => t.classList.toggle('active', (type === 'file' && i === 0) || (type === 'link' && i === 1)));
      document.getElementById('file-section').classList.toggle('hidden', type !== 'file');
      document.getElementById('link-section').classList.toggle('hidden', type !== 'link');
    }

    function handleFileSelect(input) {
      const file = input.files[0]; if (!file) return;
      document.getElementById('drop-label').innerHTML = `<div style="font-size:1.5rem">✅</div><div style="font-weight:600">${file.name}</div><div style="font-size:0.82rem;color:var(--text-dim)">${fmtBytes(file.size)}</div>`;
      if (!document.getElementById('u-title').value) document.getElementById('u-title').value = file.name.replace(/\.[^/.]+$/, '');
    }

    function setupDragDrop() {
      const zone = document.getElementById('drop-zone');
      zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
      zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
      zone.addEventListener('drop', e => {
        e.preventDefault(); zone.classList.remove('drag-over');
        const file = e.dataTransfer.files[0];
        if (file) { const dt = new DataTransfer(); dt.items.add(file); document.getElementById('u-file').files = dt.files; handleFileSelect(document.getElementById('u-file')); }
      });
    }

    async function doUpload() {
      if (!Auth.isLoggedIn()) return openAuthModal('login');
      const title = document.getElementById('u-title').value.trim();
      const subject = document.getElementById('u-subject').value;
      if (!title) return toast('Title is required', 'error');
      if (!subject) return toast('Please select a subject', 'error');
      const btn = document.getElementById('upload-btn');
      btn.disabled = true; btn.innerHTML = '<div class="loader"></div> Uploading…';
      const formData = new FormData();
      formData.append('title', title); formData.append('subject', subject);
      formData.append('description', document.getElementById('u-desc').value.trim());
      formData.append('tags', document.getElementById('u-tags').value.trim());
      formData.append('type', uploadType);
      if (uploadType === 'file') {
        const file = document.getElementById('u-file').files[0];
        if (!file) { toast('Please select a file', 'error'); btn.disabled = false; btn.innerHTML = '🚀 Upload Resource'; return; }
        formData.append('file', file);
        try { await uploadWithProgress(formData); resetForm(); loadMyUploads(); } catch (e) { toast(e.message, 'error'); }
      } else {
        const link = document.getElementById('u-link').value.trim();
        if (!link) { toast('Please enter a link', 'error'); btn.disabled = false; btn.innerHTML = '🚀 Upload Resource'; return; }
        formData.append('link', link);
        try { await api('/resources/upload', { method: 'POST', body: formData }); toast('Link shared!'); resetForm(); loadMyUploads(); } catch (e) { toast(e.message, 'error'); }
      }
      btn.disabled = false; btn.innerHTML = '🚀 Upload Resource';
    }

    function uploadWithProgress(formData) {
      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', `${API_BASE}/api/resources/upload`);
        xhr.setRequestHeader('Authorization', `Bearer ${Auth.getToken()}`);
        const pw = document.getElementById('progress-wrap'), pb = document.getElementById('progress-bar'), pp = document.getElementById('progress-pct');
        pw.classList.remove('hidden');
        xhr.upload.onprogress = e => { if (e.lengthComputable) { const p = Math.round(e.loaded / e.total * 100); pb.style.width = p + '%'; pp.textContent = p + '%'; } };
        xhr.onload = () => { pw.classList.add('hidden'); if (xhr.status < 300) { toast('Uploaded!'); resolve(); } else { try { reject(new Error(JSON.parse(xhr.responseText).error)); } catch { reject(new Error('Upload failed')); } } };
        xhr.onerror = () => { pw.classList.add('hidden'); reject(new Error('Network error')); };
        xhr.send(formData);
      });
    }

    function resetForm() {
      ['u-title','u-desc','u-tags','u-link'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('u-subject').value = '';
      document.getElementById('u-file').value = '';
      document.getElementById('drop-label').innerHTML = `<div style="font-size:2rem;margin-bottom:0.5rem">📂</div><div style="font-weight:600;margin-bottom:0.25rem">Click or drag & drop</div><div style="font-size:0.82rem;color:var(--text-dim)">PDF, DOC, DOCX, PPT, PPTX, TXT, PNG, JPG, ZIP – max 20MB</div>`;
    }

    async function loadMyUploads() {
      const el = document.getElementById('my-uploads');
      try {
        const resources = await api('/resources/user/my-uploads');
        if (!resources.length) { el.innerHTML = '<p style="color:var(--text-dim);font-size:0.9rem;margin-top:1rem">No uploads yet.</p>'; return; }
        el.innerHTML = resources.slice(0, 5).map(r => `<div class="card" style="margin-bottom:0.75rem;display:flex;align-items:center;gap:1rem;padding:1rem"><div style="flex:1"><div style="font-weight:600;font-size:0.92rem">${r.title}</div><div style="font-size:0.8rem;color:var(--text-muted)">${r.subject} · ⬇️ ${r.downloads} · ★ ${r.avg_rating ? parseFloat(r.avg_rating).toFixed(1) : '–'}</div></div><button class="btn btn-danger btn-sm" onclick="deleteRes('${r.id}')">🗑 Delete</button></div>`).join('');
      } catch {}
    }

    async function deleteRes(id) {
      if (!confirm('Delete this resource?')) return;
      try { await api(`/resources/${id}`, { method: 'DELETE' }); toast('Deleted'); loadMyUploads(); } catch (e) { toast(e.message, 'error'); }
    }
  </script>
</body>
</html>
